<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-ScissorsGame</title>
    <link rel="stylesheet"href="style2.css"
</head>
<body>
    <h1>ROCK-PAPER-SCISSORS</h1>
    <button id="newbtn">New Game</button>
    <div class="container">
        <div class="symbol"id="rock"><img src="rock.png"alt="ROCK"/></div>
        <div class="symbol"id="paper"><img src="paper.png"alt="PAPER"/></div>
        <div class="symbol"id="scissors"><img src="scissors.png"alt="SCISSORS"/></div>
    </div>
    <div class="scoreboard">
        <div class="box">
            <p class="player">player1</p>
            <p id="userscr">0</p>
        </div>
        <div class="box">
            <p class="player">computer</p>
            <p id="compscr">0</p>
        </div>
    </div>
    <div id="playbtn"><p id="msg">Play Your Move</p></div>
    
    <script src="script.js"></script>
</body>
</html>
